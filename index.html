    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }

        :root {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #888888;
            --border-color: #e0e0e0;
            --accent-color: #7c3aed;
            --accent-dark: #6d28d9;
            --accent-light: #8b5cf6;
            --purple-50: #f5f3ff;
            --purple-100: #ede9fe;
            --purple-200: #ddd6fe;
            --purple-300: #c4b5fd;
            --purple-400: #a78bfa;
            --purple-500: #8b5cf6;
            --purple-600: #7c3aed;
            --purple-700: #6d28d9;
            --purple-800: #5b21b6;
            --purple-900: #4c1d95;
            --feast-bg: #f5f3ff;
            --fast-bg: #faf5ff;
            --shadow: rgba(124, 58, 237, 0.1);
            --header-bg: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --text-primary: #f0f0f0;
            --text-secondary: #cccccc;
            --text-muted: #888888;
            --border-color: #333333;
            --accent-color: #a78bfa;
            --accent-dark: #8b5cf6;
            --accent-light: #c4b5fd;
            --feast-bg: #2e1065;
            --fast-bg: #3b0764;
            --shadow: rgba(139, 92, 246, 0.2);
            --header-bg: linear-gradient(135deg, #5b21b6 0%, #2e1065 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        header {
            background: var(--header-bg);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }

        .header-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            width: 60px;
            height: 80px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.3));
        }

        .logo svg {
            width: 100%;
            height: 100%;
            fill: white;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: white;
            text-shadow: 0 3px 12px rgba(0, 0, 0, 0.4);
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
            position: relative;
        }

        .legend {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px var(--shadow);
            border: 2px solid var(--purple-200);
            transition: all 0.3s ease;
        }

        .legend:hover {
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.15);
            transform: translateY(-2px);
        }

        .legend h3 {
            margin-bottom: 1rem;
            font-weight: 400;
            color: var(--purple-800);
        }

        .legend-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.9rem;
        }

        .legend-symbol {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: bold;
        }

        .legend-strict { background: var(--fast-bg); border-left: 3px solid var(--purple-800); }
        .legend-moderate { background: var(--fast-bg); border-left: 3px solid var(--purple-600); }
        .legend-wine { background: var(--fast-bg); border-left: 3px solid var(--purple-500); }
        .legend-fish { background: var(--fast-bg); border-left: 3px solid var(--purple-400); }

        .month {
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 2.5rem;
            overflow: hidden;
            box-shadow: 0 4px 15px var(--shadow);
            border: 2px solid var(--purple-200);
            transition: all 0.3s ease;
        }

        .month:hover {
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.15);
            transform: translateY(-2px);
        }

        .month-header {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--purple-800) 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .month-header h2 {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .month-content {
            padding: 1.5rem;
        }

        .week-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--purple-300);
        }

        .week-day {
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--purple-700);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .day {
            min-height: 100px;
            padding: 0.5rem;
            border: 1px solid var(--purple-200);
            border-radius: 8px;
            background: var(--bg-primary);
            transition: all 0.3s ease;
            cursor: default;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .day:hover {
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
            transform: translateY(-3px);
            border-color: var(--purple-400);
            z-index: 10;
            position: relative;
        }

        .day.empty {
            background: transparent;
            border: none;
        }

        .day.empty:hover {
            transform: none;
            box-shadow: none;
        }

        .day-number {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--purple-700);
            margin-bottom: 0.3rem;
        }

        .day.old-style {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .day-saint {
            font-size: 0.75rem;
            line-height: 1.4;
            color: var(--text-secondary);
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .feast {
            background: var(--feast-bg);
            border-left: 4px solid var(--accent-color);
        }

        .feast .day-saint {
            font-weight: 600;
            color: var(--purple-800);
        }

        .fast {
            background: var(--fast-bg);
        }

        .fast-symbol {
            display: inline-block;
            margin-left: 0.3rem;
            font-size: 0.7rem;
            color: var(--purple-600);
        }

        .weekend .day-number {
            color: var(--purple-800);
        }

        .special-note {
            font-size: 0.7rem;
            color: var(--purple-600);
            margin-top: 0.2rem;
            font-style: italic;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 3rem 0 2rem;
        }

        .btn {
            background: var(--bg-secondary);
            border: 2px solid var(--purple-300);
            border-radius: 50px;
            padding: 0.8rem 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1rem;
            color: var(--purple-700);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .btn:hover {
            background: var(--purple-50);
            border-color: var(--purple-500);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.25);
        }

        .btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--purple-600);
            font-size: 0.9rem;
            border-top: 2px solid var(--purple-200);
            background: var(--bg-secondary);
            margin-top: 2rem;
        }

        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: calc((100vw - 1200px) / 2 - 70px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--purple-800) 100%);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            z-index: 100;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .scroll-top:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }

        .scroll-top:active {
            transform: translateY(-1px) scale(1.02);
        }

        @media print {
            @page {
                margin: 10mm 15mm;
                size: portrait;
            }

            .container {
                max-width: 100% !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .controls, .legend, .scroll-top, header {
                display: none !important;
            }

            .month {

                page-break-inside: avoid;
                box-shadow: none !important;
                border: 1px solid #ddd !important;

            }

            }

            .month-content {

            .week-day {

            .day {

                background: white !important;
                box-shadow: none !important;

                border: none !important;

            .day-number {
                font-size: 0.8rem !important;
                color: #333 !important;

            .day.old-style {
                font-size: 0.6rem !important;
                color: #666 !important;
            }

            .day-saint {
                font-size: 0.55rem !important;
                line-height: 1.2 !important;
                color: #444 !important;
            }

            .day.feast {
                background: #f5f3ff !important;
                border-left: 2px solid #7c3aed !important;
            }

            .day.feast .day-saint {
                color: #5b21b6 !important;
            }

            .day.fast {
                background: #faf5ff !important;
            }

            .special-note {
                font-size: 0.5rem !important;
                color: #6b7280 !important;
                margin-top: 1px !important;
            }

            .fast-symbol {
                font-size: 0.5rem !important;
                color: #7c3aed !important;
            }

            .month:hover, .day:hover {
                transform: none !important;
                box-shadow: none !important;
            }

            h1, .logo svg {
                display: none !important;
            }

            .month-header {
                background: #7c3aed !important;
                color: white !important;
                padding: 4px !important;
                text-align: center !important;
            }

            .month-header h2 {
                font-size: 0.9rem !important;
                font-weight: bold !important;
                letter-spacing: 1px !important;
                text-transform: uppercase !important;
                margin: 0 !important;
                color: white !important;
            }

            footer {
                position: fixed !important;
                bottom: 5mm !important;
                left: 0 !important;
                right: 0 !important;
                text-align: center !important;
                font-size: 0.6rem !important;
                color: #666 !important;
                border-top: 1px solid #ddd !important;
                padding: 2mm 0 !important;
                margin-top: 0 !important;
            }

            footer p {
                margin: 0 !important;
                padding: 0 !important;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
            .logo {
                width: 50px;
                height: 65px;
            }
            .container {
                padding: 2rem 0.5rem 4rem;
            }
            .month-content {
                padding: 0.8rem;
            }
            .calendar-grid {
                gap: 0.3rem;
            }
            .day {
                min-height: 70px;
                padding: 0.3rem;
            }
            .day-number {
                font-size: 0.9rem;
            }
            .day-saint {
                font-size: 0.65rem;
            }
            .controls {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 200px;
                justify-content: center;
            }
            .scroll-top {
                bottom: 1rem;
                right: 1rem;
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .day {
                min-height: 60px;
                font-size: 0.7rem;
            }
            .day-number {
                font-size: 0.85rem;
            }
            .day-saint {
                font-size: 0.6rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

        const fastSymbols = { 1: "⬤", 2: "◐", 3: "◑", 4: "ⵔ" };

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            let html = '';

            months.forEach((month, monthIndex) => {
                html += `
                    <div class="month">
                        <div class="month-header">
                            <h2>${month.name}</h2>
                        </div>
                        <div class="month-content">
                            <div class="week-header">
                                ${weekDays.map((day, i) => `<div class="week-day">${day}</div>`).join('')}
                            </div>
                            <div class="calendar-grid">
                `;

                for (let i = 0; i < month.firstDay; i++) {
                    html += '<div class="day empty"></div>';
                }

                month.days.forEach((day, index) => {
                    const dayOfWeek = (month.firstDay + index) % 7;
                    const isWeekend = dayOfWeek === 5 || dayOfWeek === 6;
                    const dayClass = `day ${day.feast ? 'feast' : ''} ${day.f > 0 ? 'fast' : ''} ${isWeekend ? 'weekend' : ''}`;
                    const fastSymbol = day.f > 0 ? `<span class="fast-symbol">${fastSymbols[day.f]}</span>` : '';
                    const note = day.note ? `<div class="special-note">${day.note}</div>` : '';
                    
                    html += `
                        <div class="${dayClass}">
                            <div class="day-number">${day.n}</div>
                            <div class="day-old-style">${day.o}</div>
                            <div class="day-saint">${day.s}${fastSymbol}</div>
                            ${note}
                        </div>
                    `;
                });

                html += `
                            </div>
                        </div>
                    </div>
                `;
            });

            calendar.innerHTML = html;
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('theme-icon');
            
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        function printCalendar() {
            window.print();
        }

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        const scrollTopBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-icon').textContent = '☀️';
        }

        renderCalendar();

        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'orthodox-calendar-v3';
                self.addEventListener('install', event => { event.waitUntil(self.skipWaiting()); });
                self.addEventListener('activate', event => { event.waitUntil(self.clients.claim()); });
                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request).then(response => {
                            return response || fetch(event.request).then(fetchResponse => {
                                return caches.open(CACHE_NAME).then(cache => {
                                    cache.put(event.request, fetchResponse.clone());
                                    return fetchResponse;
                                });
                            });
                        })
                    );
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl).catch(err => {});
